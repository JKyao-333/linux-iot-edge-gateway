# Production-oriented configuration installed by the systemd setup script.

serial:
  device: /dev/ttyUSB0
  baud_rate: 115200
  reconnect_interval_seconds: 2

mqtt:
  host: localhost
  port: 1883
  topic_prefix: sensor
  cache_retry_interval_seconds: 5
  username: ""
  password: ""
  tls:
    enabled: false
    ca_file: ""
    certificate_file: ""
    private_key_file: ""
    insecure: false

tcp:
  enabled: false
  host: 127.0.0.1
  port: 9000

cache:
  type: sqlite
  path: /var/lib/linux-iot-edge-gateway/pending_messages.db

log:
  path: /var/log/linux-iot-edge-gateway/gateway.log
  level: INFO
