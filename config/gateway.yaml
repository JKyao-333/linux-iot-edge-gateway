# Development configuration for local and WSL testing.

serial:
  devices:
    - /tmp/tty_gateway
  baud_rate: 115200
  reconnect_interval_seconds: 2

modbus:
  enabled: false
  port: /dev/ttyUSB0
  baud_rate: 115200
  slave_id: 1
  function_code: 3
  start_address: 0
  register_count: 6
  poll_interval_ms: 1000
  response_timeout_ms: 500

can:
  enabled: false
  interface: can0
  heartbeat_timeout_seconds: 5

mqtt:
  host: localhost
  port: 1883
  topic_prefix: sensor
  cache_retry_interval_seconds: 5
  username: ""
  password: ""
  tls:
    enabled: false
    ca_file: ""
    certificate_file: ""
    private_key_file: ""
    insecure: false

tcp:
  enabled: true
  host: 127.0.0.1
  port: 9000

http:
  enabled: false
  host: 127.0.0.1
  port: 8080

cache:
  type: sqlite
  path: data/pending_messages.db

log:
  path: logs/gateway.log
  level: DEBUG
