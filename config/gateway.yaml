# Reference configuration.
# YAML loading will be added in a later version.

serial:
  device: /tmp/tty_gateway
  baud_rate: 115200
  reconnect_interval_seconds: 2

protocol:
  frame_header: "AA55"
  max_payload_length: 64
  sensor_command: 1

mqtt:
  host: localhost
  port: 1883
  topic_prefix: sensor
  cache_retry_interval_seconds: 5

cache:
  path: data/pending_messages.cache

log:
  path: logs/gateway.log
  level: DEBUG
