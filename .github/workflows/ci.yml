name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-build-test:
    name: Native build and test
    runs-on: ubuntu-22.04
    env:
      BUILD_DIR: ${{ github.workspace }}/build

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            iproute2 \
            libmosquitto-dev \
            libsqlite3-dev \
            libyaml-cpp-dev \
            mosquitto \
            mosquitto-clients \
            openssl \
            pkg-config \
            python3 \
            python3-pip \
            python3-serial \
            socat \
            sqlite3
          python3 -m pip install --user pyserial

      - name: Start Mosquitto
        shell: bash
        run: |
          sudo systemctl start mosquitto \
            || sudo service mosquitto start \
            || true

          for attempt in {1..20}; do
            ss -lnt | grep -q ':1883' && break
            sleep 0.25
          done

          if ! ss -lnt | grep -q ':1883'; then
            mosquitto -p 1883 -d
          fi

          for attempt in {1..20}; do
            ss -lnt | grep -q ':1883' && exit 0
            sleep 0.25
          done

          echo "[FAIL] Mosquitto did not begin listening on port 1883"
          exit 1

      - name: Configure and build
        run: |
          cmake -S . -B "${BUILD_DIR}" -DCMAKE_BUILD_TYPE=Release
          cmake --build "${BUILD_DIR}" --parallel

      - name: Run CTest
        run: ctest --test-dir "${BUILD_DIR}" --output-on-failure

      - name: Run smoke test
        run: ./scripts/run_smoke_test.sh

      - name: Run HTTP observability test
        run: ./scripts/run_observability_test.sh

      - name: Run validation workflow check
        run: ./scripts/run_validation_workflow_check.sh

      - name: Generate redacted evidence summary
        run: ./scripts/collect_evidence_summary.sh

  script-workflow-check:
    name: Script and protocol workflow check
    runs-on: ubuntu-22.04
    env:
      BUILD_DIR: ${{ github.workspace }}/build-protocol

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            iproute2 \
            kmod \
            libmosquitto-dev \
            libsqlite3-dev \
            libyaml-cpp-dev \
            mosquitto \
            mosquitto-clients \
            pkg-config \
            python3 \
            python3-pip \
            python3-serial \
            socat \
            sqlite3
          python3 -m pip install --user pyserial

      - name: Start Mosquitto
        shell: bash
        run: |
          sudo systemctl start mosquitto \
            || sudo service mosquitto start \
            || true
          if ! ss -lnt | grep -q ':1883'; then
            mosquitto -p 1883 -d
          fi
          for attempt in {1..20}; do
            ss -lnt | grep -q ':1883' && exit 0
            sleep 0.25
          done
          echo "[FAIL] Mosquitto did not begin listening on port 1883"
          exit 1

      - name: Check shell and Python scripts
        shell: bash
        run: |
          find scripts -maxdepth 1 -type f -name '*.sh' -print0 \
            | xargs -0 -n1 bash -n
          python3 -m compileall -q scripts

      - name: Check public wording
        shell: bash
        run: |
          forbidden_pattern='面''试|简''历|秋''招|求''职|面''试官'
          unresolved_pattern='待''归档|待''补录|待''补充|手动''补充|待归档''台账字段|历史''实验室|实验室''台账|内部''台账|历史设备''台账|早期''实验室'

          if grep -R -n -E "${forbidden_pattern}" \
              README.md docs docker .github/workflows; then
            echo "[FAIL] forbidden wording found"
            exit 1
          fi

          if grep -R -n -E "${unresolved_pattern}" \
              README.md docs CHANGELOG.md; then
            echo "[FAIL] unresolved public evidence wording found"
            exit 1
          fi

      - name: Prepare vcan0 when permitted
        shell: bash
        run: |
          if ! ip link show vcan0 >/dev/null 2>&1; then
            sudo modprobe vcan 2>/dev/null || true
            sudo ip link add dev vcan0 type vcan 2>/dev/null || true
            sudo ip link set up vcan0 2>/dev/null || true
          fi

          if ip link show vcan0 >/dev/null 2>&1; then
            echo "VCAN_AVAILABLE=true" >> "${GITHUB_ENV}"
            echo "[INFO] vcan0 is available"
          else
            echo "VCAN_AVAILABLE=false" >> "${GITHUB_ENV}"
            echo "[SKIP] vcan0 is unavailable; run locally with CAP_NET_ADMIN"
          fi

      - name: Run protocol integration test
        if: env.VCAN_AVAILABLE == 'true'
        run: ./scripts/run_protocol_integration_test.sh

      - name: Record protocol integration skip
        if: env.VCAN_AVAILABLE != 'true'
        run: echo "[SKIP] vcan0 is unavailable; run locally with CAP_NET_ADMIN"

  docker-compose-check:
    name: Docker Compose configuration check
    runs-on: ubuntu-22.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose config

  aarch64-cross-build:
    name: ARM64 cross build
    runs-on: ubuntu-22.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install cross-build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            file \
            g++-aarch64-linux-gnu \
            pkg-config \
            qemu-user

      - name: Prepare ARM64 dependency sysroot
        env:
          AARCH64_TOOLS_ROOT: ${{ runner.temp }}/aarch64-tools
        run: ./scripts/setup_aarch64_sysroot.sh

      - name: Build and verify ARM64 artifact
        env:
          AARCH64_TOOLS_ROOT: ${{ runner.temp }}/aarch64-tools
          AARCH64_BUILD_DIR: ${{ runner.temp }}/aarch64-build
        shell: bash
        run: |
          set -o pipefail
          ./scripts/build_aarch64.sh 2>&1 | tee arm64-build.log
          status=${PIPESTATUS[0]}
          if (( status != 0 )); then
            {
              echo "## ARM64 build failure"
              echo '```text'
              tail -n 120 arm64-build.log
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
            exit "${status}"
          fi

      - name: Upload ARM64 build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arm64-build-log
          path: arm64-build.log
          if-no-files-found: ignore

      - name: Upload ARM64 deployment package
        uses: actions/upload-artifact@v4
        with:
          name: linux-iot-edge-gateway-aarch64
          path: |
            ${{ runner.temp }}/aarch64-tools/artifacts/linux-iot-edge-gateway-*-aarch64.tar.gz
            ${{ runner.temp }}/aarch64-tools/artifacts/linux-iot-edge-gateway-*-aarch64.tar.gz.sha256
          if-no-files-found: error
