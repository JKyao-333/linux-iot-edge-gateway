name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  native-tests:
    name: Ubuntu native tests
    runs-on: ubuntu-22.04
    env:
      BUILD_DIR: /tmp/linux-iot-edge-gateway-build

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            iproute2 \
            libmosquitto-dev \
            libsqlite3-dev \
            libyaml-cpp-dev \
            mosquitto \
            mosquitto-clients \
            openssl \
            pkg-config \
            python3 \
            python3-serial \
            socat \
            sqlite3

      - name: Start Mosquitto
        shell: bash
        run: |
          sudo service mosquitto start
          for attempt in {1..30}; do
            if ss -lnt | grep -q ':1883'; then
              exit 0
            fi
            sleep 0.2
          done
          echo "Mosquitto did not begin listening on port 1883"
          exit 1

      - name: Configure and build native targets
        shell: bash
        run: |
          set -o pipefail
          cmake -S . -B "${BUILD_DIR}" 2>&1 | tee native-test.log
          cmake --build "${BUILD_DIR}" --parallel 2>&1 | tee -a native-test.log

      - name: Run CTest suite
        run: |
          ctest --test-dir "${BUILD_DIR}" --output-on-failure \
            2>&1 | tee -a native-test.log

      - name: Run MQTT authentication and TLS smoke test
        run: ./scripts/run_mqtt_security_smoke_test.sh 2>&1 | tee -a native-test.log

      - name: Run graceful shutdown smoke test
        run: ./scripts/run_shutdown_smoke_test.sh 2>&1 | tee -a native-test.log

      - name: Run cache migration smoke test
        run: ./scripts/run_cache_migration_test.sh 2>&1 | tee -a native-test.log

      - name: Run serial-to-MQTT smoke test
        run: ./scripts/run_serial_smoke_test.sh 2>&1 | tee -a native-test.log

      - name: Run multi-serial MQTT smoke test
        run: ./scripts/run_multi_serial_smoke_test.sh 2>&1 | tee -a native-test.log

      - name: Run TCP smoke test
        run: ./scripts/run_tcp_smoke_test.sh 2>&1 | tee -a native-test.log

      - name: Upload native test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-test-log
          path: native-test.log
          if-no-files-found: ignore

  aarch64-cross-build:
    name: ARM64 cross build
    runs-on: ubuntu-22.04

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install cross-build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            file \
            g++-aarch64-linux-gnu \
            pkg-config \
            qemu-user

      - name: Prepare ARM64 dependency sysroot
        env:
          AARCH64_TOOLS_ROOT: ${{ runner.temp }}/aarch64-tools
        run: ./scripts/setup_aarch64_sysroot.sh

      - name: Build and verify ARM64 artifact
        env:
          AARCH64_TOOLS_ROOT: ${{ runner.temp }}/aarch64-tools
          AARCH64_BUILD_DIR: ${{ runner.temp }}/aarch64-build
        shell: bash
        run: |
          set -o pipefail
          ./scripts/build_aarch64.sh 2>&1 | tee arm64-build.log
          status=${PIPESTATUS[0]}
          if (( status != 0 )); then
            {
              echo "## ARM64 build failure"
              echo '```text'
              tail -n 120 arm64-build.log
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
            exit "${status}"
          fi

      - name: Upload ARM64 build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arm64-build-log
          path: arm64-build.log
          if-no-files-found: ignore

      - name: Upload ARM64 deployment package
        uses: actions/upload-artifact@v4
        with:
          name: linux-iot-edge-gateway-aarch64
          path: |
            ${{ runner.temp }}/aarch64-tools/artifacts/linux-iot-edge-gateway-*-aarch64.tar.gz
            ${{ runner.temp }}/aarch64-tools/artifacts/linux-iot-edge-gateway-*-aarch64.tar.gz.sha256
          if-no-files-found: error
