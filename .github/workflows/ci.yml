name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  native-tests:
    name: Ubuntu native tests
    runs-on: ubuntu-22.04

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            iproute2 \
            libmosquitto-dev \
            libsqlite3-dev \
            libyaml-cpp-dev \
            mosquitto \
            mosquitto-clients \
            openssl \
            pkg-config \
            python3 \
            python3-serial \
            socat \
            sqlite3

      - name: Start Mosquitto
        run: sudo service mosquitto start

      - name: Run native test suite
        shell: bash
        run: |
          set -o pipefail
          ./scripts/run_smoke_test.sh 2>&1 | tee native-test.log
          status=${PIPESTATUS[0]}
          if (( status != 0 )); then
            {
              echo "## Native test failure"
              echo '```text'
              tail -n 120 native-test.log
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
            exit "${status}"
          fi

      - name: Upload native test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-test-log
          path: native-test.log
          if-no-files-found: ignore

  aarch64-cross-build:
    name: ARM64 cross build
    runs-on: ubuntu-22.04

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install cross-build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            file \
            g++-aarch64-linux-gnu \
            pkg-config \
            qemu-user

      - name: Prepare ARM64 dependency sysroot
        env:
          AARCH64_TOOLS_ROOT: ${{ runner.temp }}/aarch64-tools
        run: ./scripts/setup_aarch64_sysroot.sh

      - name: Build and verify ARM64 artifact
        env:
          AARCH64_TOOLS_ROOT: ${{ runner.temp }}/aarch64-tools
          AARCH64_BUILD_DIR: ${{ runner.temp }}/aarch64-build
        shell: bash
        run: |
          set -o pipefail
          ./scripts/build_aarch64.sh 2>&1 | tee arm64-build.log
          status=${PIPESTATUS[0]}
          if (( status != 0 )); then
            {
              echo "## ARM64 build failure"
              echo '```text'
              tail -n 120 arm64-build.log
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
            exit "${status}"
          fi

      - name: Upload ARM64 build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arm64-build-log
          path: arm64-build.log
          if-no-files-found: ignore

      - name: Upload ARM64 deployment package
        uses: actions/upload-artifact@v4
        with:
          name: linux-iot-edge-gateway-aarch64
          path: |
            ${{ runner.temp }}/aarch64-tools/artifacts/linux-iot-edge-gateway-*-aarch64.tar.gz
            ${{ runner.temp }}/aarch64-tools/artifacts/linux-iot-edge-gateway-*-aarch64.tar.gz.sha256
          if-no-files-found: error
